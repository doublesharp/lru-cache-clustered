name: CI
on:
  push:
    branches: [main, v2-typescript]
  pull_request:

jobs:
  # Node 22 is exercised by the Coverage workflow; this matrix only adds
  # cross-version coverage on the LTS lines we don't already cover.
  test:
    name: test (node ${{ matrix.node }})
    strategy:
      fail-fast: false
      matrix:
        node: ['24']
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
