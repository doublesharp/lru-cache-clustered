name: Coverage

on:
  workflow_dispatch:
  push:
    branches: [main, v2-typescript]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  doublcov:
    name: coverage (node 22)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Doublcov history
        uses: actions/cache/restore@v4
        with:
          path: .doublcov/history.json
          key: doublcov-history-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            doublcov-history-${{ github.ref_name }}-
            doublcov-history-

      - name: Generate LCOV
        run: pnpm test:coverage

      - name: Upload Codecov report
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: true

      - name: Generate Doublcov report
        uses: doublesharp/doublcov@v0
        with:
          version: latest
          command: build
          args: --lcov coverage/lcov.info --sources src --out coverage/report --history .doublcov/history.json --name lru-cache-clustered

      - name: Save Doublcov history
        if: always() && hashFiles('.doublcov/history.json') != ''
        uses: actions/cache/save@v4
        with:
          path: .doublcov/history.json
          key: doublcov-history-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Doublcov report
        if: always() && hashFiles('coverage/report/index.html') != ''
        uses: actions/upload-artifact@v4
        with:
          name: doublcov-report
          path: coverage/report
          if-no-files-found: error

      - name: Upload coverage data
        if: always() && hashFiles('coverage/lcov.info') != ''
        uses: actions/upload-artifact@v4
        with:
          name: doublcov-data
          path: |
            coverage/lcov.info
            .doublcov/history.json
          if-no-files-found: warn
          include-hidden-files: true

      - name: Prepare Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && hashFiles('coverage/report/index.html') != ''
        run: |
          mkdir -p pages/coverage
          cp -R coverage/report/. pages/coverage/
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>lru-cache-clustered coverage</title>
          <script>location.replace("coverage/" + location.hash);</script>
          <meta http-equiv="refresh" content="0; url=coverage/">
          <a href="coverage/">lru-cache-clustered coverage report</a>
          HTML

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && hashFiles('pages/coverage/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Write summary
        if: always() && hashFiles('coverage/report/index.html') != ''
        run: |
          {
            echo "## Doublcov coverage"
            echo
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "Download and extract the \`doublcov-report\` artifact, then preview it with \`npx @0xdoublesharp/doublcov@0 open coverage/report\`."
            elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "This run also publishes the report to GitHub Pages."
            else
              echo "This branch run uploads the \`doublcov-report\` artifact. GitHub Pages deployment only runs from \`main\`."
            fi
            echo
            echo "History is restored from and saved to the \`doublcov-history-*\` Actions cache keys."
          } >> "$GITHUB_STEP_SUMMARY"

  pages:
    name: Publish coverage page
    needs: doublcov
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}coverage/
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Write Pages summary
        run: |
          {
            echo "## Published coverage"
            echo
            echo "${{ steps.deployment.outputs.page_url }}coverage/"
          } >> "$GITHUB_STEP_SUMMARY"
