name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run knip
      - run: pnpm run type-coverage
      - run: pnpm run build
      - run: pnpm run size
      - run: pnpm run prepare:publish
      - run: npm publish ./dist-publish/scoped --access public --provenance
      - run: npm publish ./dist-publish/legacy --access public --provenance
