name: Quality
on:
  push:
    branches: [main, v2-typescript]
  pull_request:

jobs:
  quality:
    name: lint / typecheck / knip / type-coverage / size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm knip
      - run: pnpm type-coverage
      - run: pnpm build
      - run: pnpm size
