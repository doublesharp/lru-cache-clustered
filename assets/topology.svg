<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>One LRU cache shared across cluster workers via IPC</title>
  <desc>The primary process holds a Map of namespaced LRUCache instances. Each worker sends typed IPC requests to the primary for every cache operation; the primary executes against the in-process cache and sends the response back. In primary mode there is no IPC — calls invoke the dispatcher directly.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <!-- Primary process container -->
  <rect x="20" y="20" width="840" height="130" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="40" y="48" font-size="15" font-weight="600" fill="#1e3a8a">Primary process</text>
  <text x="40" y="66" font-size="11" fill="#475569">cluster.isPrimary === true</text>

  <!-- caches Map -->
  <rect x="40" y="80" width="360" height="56" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="220" y="98" text-anchor="middle" font-size="11" fill="#475569">caches: Map&lt;namespace, LRUCache&gt;</text>
  <rect x="56" y="106" width="68" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="90" y="121" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="500">sessions</text>
  <rect x="132" y="106" width="56" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="160" y="121" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="500">users</text>
  <rect x="196" y="106" width="56" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="224" y="121" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="500">flags</text>
  <rect x="260" y="106" width="56" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="288" y="121" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="500">stats</text>
  <rect x="324" y="106" width="60" height="22" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="3,2"/>
  <text x="354" y="121" text-anchor="middle" font-size="11" fill="#64748b">…</text>

  <!-- dispatchOp box -->
  <rect x="420" y="80" width="180" height="56" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="510" y="103" text-anchor="middle" font-size="13" font-weight="500" fill="#1f2937">dispatchOp(...)</text>
  <text x="510" y="122" text-anchor="middle" font-size="11" fill="#64748b">single source of truth</text>

  <!-- primary-mode shortcut callout -->
  <rect x="620" y="80" width="220" height="56" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="730" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#713f12">primary-mode call</text>
  <text x="730" y="116" text-anchor="middle" font-size="11" fill="#713f12">no IPC, no allocation</text>
  <text x="730" y="130" text-anchor="middle" font-size="11" fill="#713f12">→ direct dispatchOp()</text>

  <!-- Workers row -->
  <g>
    <rect x="60" y="240" width="220" height="110" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="170" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Worker 1</text>
    <text x="170" y="284" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <text x="170" y="312" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.get('k')</text>
    <text x="170" y="330" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.set('k', v)</text>
  </g>
  <g>
    <rect x="330" y="240" width="220" height="110" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="440" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Worker 2</text>
    <text x="440" y="284" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <text x="440" y="312" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.incr('hits')</text>
    <text x="440" y="330" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.stats()</text>
  </g>
  <g>
    <rect x="600" y="240" width="220" height="110" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="710" y="266" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a">Worker N</text>
    <text x="710" y="284" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <text x="710" y="312" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.fetch(k, fn)</text>
    <text x="710" y="330" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">// dedups in-flight</text>
  </g>

  <!-- IPC arrows: requests up (blue), responses down (gray) -->
  <!-- Worker 1 ↔ primary -->
  <path d="M 160 240 L 160 150" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 180 150 L 180 240" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arr-down)"/>

  <!-- Worker 2 ↔ primary -->
  <path d="M 430 240 L 430 150" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 450 150 L 450 240" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arr-down)"/>

  <!-- Worker N ↔ primary -->
  <path d="M 700 240 L 700 150" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 720 150 L 720 240" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arr-down)"/>

  <!-- IPC labels -->
  <text x="155" y="195" text-anchor="end" font-size="10" fill="#2563eb" font-weight="600">request</text>
  <text x="185" y="195" text-anchor="start" font-size="10" fill="#6b7280" font-weight="600">response</text>
  <text x="425" y="195" text-anchor="end" font-size="10" fill="#2563eb" font-weight="600">request</text>
  <text x="455" y="195" text-anchor="start" font-size="10" fill="#6b7280" font-weight="600">response</text>
  <text x="695" y="195" text-anchor="end" font-size="10" fill="#2563eb" font-weight="600">request</text>
  <text x="725" y="195" text-anchor="start" font-size="10" fill="#6b7280" font-weight="600">response</text>

  <!-- IPC heading on the left -->
  <text x="40" y="200" font-size="11" font-weight="600" fill="#475569">node:cluster IPC</text>
  <text x="40" y="215" font-size="10" fill="#94a3b8">typed Request/Response</text>
</svg>
