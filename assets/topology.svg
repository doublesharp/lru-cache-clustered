<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" width="980" height="560" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <title>Clustered LRU with optional per-worker local L1 caches</title>
  <desc>The primary process owns the authoritative namespaced LRU caches and version counters. Workers normally use typed cluster IPC requests and responses. With local L1 enabled, hot reads can be served from a worker-local cache without IPC; writes still go to the primary and broadcast versioned invalidations back to worker L1 caches. Correctness-sensitive reads can bypass L1.</desc>

  <defs>
    <marker id="request-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="response-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9ca3af"/>
    </marker>
    <marker id="l1-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#059669"/>
    </marker>
    <marker id="invalidate-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#9333ea"/>
    </marker>
  </defs>

  <!-- Primary process container -->
  <rect x="20" y="20" width="940" height="150" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="40" y="50" font-size="17" font-weight="700" fill="#1e3a8a">Primary process</text>
  <text x="40" y="70" font-size="12" fill="#475569">cluster.isPrimary === true</text>

  <!-- Authoritative cache registry -->
  <rect x="40" y="92" width="365" height="58" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="222" y="111" text-anchor="middle" font-size="12" fill="#475569">caches: Map&lt;namespace, LRUCache&gt;</text>
  <rect x="56" y="120" width="72" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="92" y="135" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="600">sessions</text>
  <rect x="136" y="120" width="58" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="165" y="135" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="600">users</text>
  <rect x="202" y="120" width="58" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="231" y="135" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="600">flags</text>
  <rect x="268" y="120" width="58" height="22" rx="4" fill="#dbeafe" stroke="#2563eb"/>
  <text x="297" y="135" text-anchor="middle" font-size="11" fill="#1e3a8a" font-weight="600">stats</text>
  <rect x="334" y="120" width="54" height="22" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-dasharray="3,2"/>
  <text x="361" y="135" text-anchor="middle" font-size="11" fill="#64748b">...</text>

  <!-- Version and invalidation state -->
  <rect x="425" y="92" width="190" height="58" rx="6" fill="#faf5ff" stroke="#9333ea"/>
  <text x="520" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#581c87">namespace versions</text>
  <text x="520" y="128" text-anchor="middle" font-size="11" fill="#6b21a8">mutations bump version</text>
  <text x="520" y="143" text-anchor="middle" font-size="11" fill="#6b21a8">push L1 invalidations</text>

  <!-- dispatchOp box -->
  <rect x="635" y="92" width="160" height="58" rx="6" fill="#ffffff" stroke="#94a3b8"/>
  <text x="715" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2937">dispatchOp(...)</text>
  <text x="715" y="136" text-anchor="middle" font-size="11" fill="#64748b">source of truth</text>

  <!-- primary-mode shortcut callout -->
  <rect x="815" y="92" width="125" height="58" rx="6" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="877" y="112" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">primary-mode</text>
  <text x="877" y="128" text-anchor="middle" font-size="11" fill="#713f12">no IPC</text>
  <text x="877" y="143" text-anchor="middle" font-size="11" fill="#713f12">direct call</text>

  <!-- L1 feature callout -->
  <rect x="40" y="195" width="900" height="64" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="62" y="216" font-size="13" font-weight="700" fill="#065f46">v2.1 local L1 mode</text>
  <text x="62" y="233" font-size="11" fill="#047857">Hot get/has/peek/mGet/fetch reads can return from process-local memory.</text>
  <text x="62" y="248" font-size="11" fill="#047857">Misses, writes, counters, stats, and correctness-sensitive reads still go through the primary.</text>
  <text x="680" y="216" font-size="11" fill="#047857">Controls: bypassL1, withoutLocal(), updateL1</text>
  <text x="680" y="233" font-size="11" fill="#047857">Method filters choose which reads use L1</text>
  <text x="680" y="248" font-size="11" fill="#047857">TTL bounded by primary TTL + version checks</text>

  <!-- Worker 1 -->
  <g>
    <rect x="40" y="340" width="270" height="155" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="175" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Worker 1</text>
    <text x="175" y="383" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <rect x="64" y="399" width="222" height="42" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="175" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">local L1 cache</text>
    <text x="175" y="432" text-anchor="middle" font-size="10" fill="#047857">hot read hit -> no IPC</text>
    <text x="175" y="463" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.fetch(k, fn)</text>
    <text x="175" y="481" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">localStats().ipcAvoided++</text>
  </g>

  <!-- Worker 2 -->
  <g>
    <rect x="355" y="340" width="270" height="155" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="490" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Worker 2</text>
    <text x="490" y="383" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <rect x="379" y="399" width="222" height="42" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="490" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">local L1 cache</text>
    <text x="490" y="432" text-anchor="middle" font-size="10" fill="#047857">drops keys on invalidation</text>
    <text x="490" y="463" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.set('k', v)</text>
    <text x="490" y="481" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">await cache.incr('hits')</text>
  </g>

  <!-- Worker N -->
  <g>
    <rect x="670" y="340" width="270" height="155" rx="8" fill="#ffffff" stroke="#475569" stroke-width="1.5"/>
    <text x="805" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Worker N</text>
    <text x="805" y="383" text-anchor="middle" font-size="11" fill="#64748b">cluster.isWorker === true</text>
    <rect x="694" y="399" width="222" height="42" rx="6" fill="#ecfdf5" stroke="#059669"/>
    <text x="805" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">local L1 cache</text>
    <text x="805" y="432" text-anchor="middle" font-size="10" fill="#047857">optional per method</text>
    <text x="805" y="463" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">cache.withoutLocal().get(k)</text>
    <text x="805" y="481" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#334155">cache.get(k, { bypassL1: true })</text>
  </g>

  <!-- IPC arrows: requests up (blue), responses down (gray) -->
  <path d="M 170 340 L 170 170" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#request-arrow)"/>
  <path d="M 194 170 L 194 340" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#response-arrow)"/>
  <path d="M 485 340 L 485 170" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#request-arrow)"/>
  <path d="M 509 170 L 509 340" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#response-arrow)"/>
  <path d="M 800 340 L 800 170" stroke="#2563eb" stroke-width="1.5" fill="none" marker-end="url(#request-arrow)"/>
  <path d="M 824 170 L 824 340" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#response-arrow)"/>

  <text x="165" y="305" text-anchor="end" font-size="10" fill="#2563eb" font-weight="700">miss/write request</text>
  <text x="199" y="305" text-anchor="start" font-size="10" fill="#6b7280" font-weight="700">response + version</text>
  <text x="480" y="305" text-anchor="end" font-size="10" fill="#2563eb" font-weight="700">write/counter request</text>
  <text x="514" y="305" text-anchor="start" font-size="10" fill="#6b7280" font-weight="700">response</text>
  <text x="795" y="305" text-anchor="end" font-size="10" fill="#2563eb" font-weight="700">bypass request</text>
  <text x="829" y="305" text-anchor="start" font-size="10" fill="#6b7280" font-weight="700">fresh response</text>

  <!-- L1 local hit path inside Worker 1 -->
  <path d="M 100 463 C 72 451 72 415 104 414" stroke="#059669" stroke-width="2" stroke-dasharray="4,3" fill="none" marker-end="url(#l1-arrow)"/>
  <text x="86" y="449" text-anchor="middle" font-size="10" font-weight="700" fill="#047857">L1 hit</text>

  <!-- Versioned invalidation pushes from primary to workers -->
  <path d="M 520 170 C 420 248 222 270 222 399" stroke="#9333ea" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#invalidate-arrow)"/>
  <path d="M 520 170 C 512 248 520 270 520 399" stroke="#9333ea" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#invalidate-arrow)"/>
  <path d="M 520 170 C 628 248 835 270 835 399" stroke="#9333ea" stroke-width="1.6" stroke-dasharray="5,4" fill="none" marker-end="url(#invalidate-arrow)"/>
  <rect x="585" y="272" width="188" height="34" rx="5" fill="#ffffff" opacity="0.9"/>
  <text x="594" y="286" font-size="10" font-weight="700" fill="#7e22ce">versioned invalidation push</text>
  <text x="594" y="301" font-size="10" fill="#7e22ce">set/delete/clear/load/purgeStale</text>

  <!-- Legend -->
  <rect x="40" y="528" width="900" height="20" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
  <line x1="58" y1="538" x2="98" y2="538" stroke="#2563eb" stroke-width="1.5" marker-end="url(#request-arrow)"/>
  <text x="106" y="542" font-size="10" fill="#334155">IPC request</text>
  <line x1="190" y1="538" x2="230" y2="538" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#response-arrow)"/>
  <text x="238" y="542" font-size="10" fill="#334155">response</text>
  <line x1="315" y1="538" x2="355" y2="538" stroke="#059669" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#l1-arrow)"/>
  <text x="363" y="542" font-size="10" fill="#334155">local L1 hit</text>
  <line x1="455" y1="538" x2="495" y2="538" stroke="#9333ea" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#invalidate-arrow)"/>
  <text x="503" y="542" font-size="10" fill="#334155">invalidation push</text>
  <text x="760" y="542" font-size="10" fill="#64748b">Primary cache remains authoritative.</text>
</svg>
